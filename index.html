<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22c55e">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Chuteira</title>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            text-align: center;
        }

        #version {
            font-size: 10px;
            color: #94a3b8;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        .container {
            width: 360px;
            margin: auto;
            margin-top: 10px;
            padding: 15px;
            border-radius: 15px;
            background: #0f172a;
            border: 2px solid #22c55e;
        }

        h1 {
            color: #22c55e;
        }

        .bar {
            height: 20px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #4ade80);
        }

        button {
            padding: 8px;
            margin: 4px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .add {
            background: #22c55e;
        }

        .remove {
            background: #ef4444;
        }

        .shop {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .log {
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 10px;
        }

        .mission {
            background: #1e293b;
            padding: 8px;
            border-radius: 8px;
            margin: 5px;
        }

        .done {
            text-decoration: line-through;
            opacity: 0.6;
        }

        #ball {
            font-size: 100px;
            animation: kick 1s ease forwards;
        }

        @keyframes kick {
            0% {
                transform: translateX(-300px) scale(1);
            }

            50% {
                transform: scale(1.4) rotate(180deg);
            }

            100% {
                transform: translateX(0) rotate(360deg);
            }
        }

        #goalAnimation h1 {
            color: #22c55e;
            font-size: 28px;
        }

        #goalAnimation h2 {
            font-size: 20px;
        }

        #trophy {
            font-size: 120px;
            animation: trophyAnim 2s ease infinite alternate;
        }

        @keyframes trophyAnim {
            0% {
                transform: scale(1) rotate(-5deg);
            }

            100% {
                transform: scale(1.2) rotate(5deg);
            }
        }

        #championAnimation h1 {
            color: gold;
            font-size: 32px;
        }

        #championAnimation h2 {
            font-size: 20px;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>⚽ Missão Chuteira</h1>

        <div id="version">Versão 10</div>

        <button id="installBtn" style="display:none; background:#22c55e;">
            📲 Instalar App
        </button>

        <input id="fileInput" type="file" accept="image/*" onchange="loadAvatar(event)" style="display:none;">
        <br><br>
        <img id="avatar" width="100" style="border-radius:50%; cursor:pointer;" onclick="openAvatarModal()">
        <h3 id="name"></h3>
        <div id="rank"></div>
        <h2 id="points"></h2>

        <div class="bar">
            <div class="fill" id="bar"></div>
        </div>

        <h3>🎯 Ações</h3>
        <button onclick="admin()">⚙️</button>
        <button class="add" onclick="gain(5,'Tarefa')">+5</button>
        <button class="add" onclick="gain(10,'Controle')">+10</button>
        <button class="remove" onclick="lose(10,'Respondeu mal')">-10</button>

        <h3>📅 Missões do dia</h3>
        <div id="missions"></div>

        <h3>🛒 Loja</h3>
        <div class="shop">
            <button onclick="buy(50,'Doce')">🍬 Doce (50)</button>
            <button onclick="buy(100,'Filme')">🍔 Lanche (100)</button>
            <button onclick="buy(400,'Jogo')">🎮 Diamante FF (400)</button>
        </div>

        <div class="log" id="log"></div>
    </div>

    <canvas id="fireworks" style="
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;
        z-index:9998;
        "></canvas>

    <audio id="goalSound" src="gol.mp3"></audio>

    <div id="goalAnimation" style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.9);
        z-index:9999;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        ">

        <div id="ball">⚽</div>

        <h1>⚽ GOL DO DIA!</h1>
        <h2>🔥 Bora pra cima!</h2>

    </div>

    <div id="avatarModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
">

        <img id="avatarBig" style="width:200px; border-radius:50%; margin-bottom:20px;">

        <button onclick="document.getElementById('fileInput').click()">
            🔄 Trocar imagem
        </button>

        <button onclick="closeAvatarModal()" style="margin-top:10px; background:#ef4444;">
            ❌ Fechar
        </button>

    </div>

    <audio id="championSound" src="campeao.mp3"></audio>

    <div id="championAnimation" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
">

        <div id="trophy">🏆</div>

        <h1>🏆 É CAMPEÃO!!</h1>
        <h2>🔥 Você ganhou a chuteira!</h2>

    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        let adminUnlocked = false;

        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAWgsHnLAUopuadUDmCVqjQEPwace0fiSU",
            authDomain: "chuteira-v4.firebaseapp.com",
            projectId: "chuteira-v4",
            storageBucket: "chuteira-v4.firebasestorage.app",
            messagingSenderId: "872183778044",
            appId: "1:872183778044:web:00df16aea5039b31a1a579"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // USUÁRIO
        let name = localStorage.getItem("name");

        if (!name || name === "null") {
            name = prompt("Nome do jogador:");
            localStorage.setItem("name", name);
        }

        let points = parseInt(localStorage.getItem("points") || 800);
        const goal = 1000;

        // CLOUD
        function saveCloud() {
            let missions = JSON.parse(localStorage.getItem("missions"));
            let avatar = localStorage.getItem("avatar");
            let logs = JSON.parse(localStorage.getItem("logs") || "[]");

            db.collection("usuarios").doc(name).set({
                pontos: points,
                missions: missions,
                avatar: avatar,
                logs: logs
            });
        }

        function loadCloud() {

            
            name = name.trim().toLowerCase();
            localStorage.setItem("name", name);

            db.collection("usuarios").doc(name).get().then(doc => {

                if (doc.exists) {
                    let data = doc.data();

                    points = data.pontos ?? 800;

                    if (data.missions) {
                        localStorage.setItem("missions", JSON.stringify(data.missions));
                    }

                    if (data.avatar) {
                        localStorage.setItem("avatar", data.avatar);
                        document.getElementById("avatar").src = data.avatar;
                    }

                    if (data.logs) {
                        localStorage.setItem("logs", JSON.stringify(data.logs));
                    }

                } else {
                    localStorage.setItem("logs", JSON.stringify([]));
                    saveCloud();
                }

                loadMissions();
                renderLogs(); 
                update();

            }).catch(err => {
                console.error("Erro ao carregar do Firebase:", err);
            });
        }

        // ADMIN
        function admin() {
            let senha = prompt("Senha do Tio:");
            if (senha === "382648") {
                adminUnlocked = !adminUnlocked;
                alert(adminUnlocked ? "Modo Tio ATIVADO 🔓" : "Modo Tio DESATIVADO 🔒");
            }
        }

        // RANK
        function rank() {
            if (points < 850) return "Bronze";
            if (points < 900) return "Prata";
            if (points < 950) return "Ouro";
            if (points < 1000) return "Elite";
            return "🏆 Campeão";
        }

        // UPDATE UI
        function update() {
            document.getElementById("name").innerText = "Jogador: " + name;
            document.getElementById("points").innerText = points + " XP";
            document.getElementById("rank").innerText = "Liga: " + rank();

            let percent = (points / goal) * 100;
            document.getElementById("bar").style.width = percent + "%";

            localStorage.setItem("points", points);

            if (points >= goal && !localStorage.getItem("won")) {
                localStorage.setItem("won", "true");
                showChampionAnimation();
            }

            saveCloud();
        }

        // AÇÕES
        function gain(v, t) {
            if (!adminUnlocked) return alert("Aguardando liberação do Tio 👨‍👦");
            points += v;
            log("+" + v + " " + t);
            update();
        }

        function lose(v, t) {
            if (!adminUnlocked) return alert("Aguardando liberação do Tio 👨‍👦");
            points -= v;
            log("-" + v + " " + t);
            update();
        }

        // LOG
        function log(txt) {
            let box = document.getElementById("log");
            let time = new Date().toLocaleTimeString();

            let newLog = "[" + time + "] " + txt;

            let logs = JSON.parse(localStorage.getItem("logs") || "[]");

            logs.unshift(newLog);

            logs = logs.slice(0, 50);

            localStorage.setItem("logs", JSON.stringify(logs));

            renderLogs();
        }

        function renderLogs() {
            let box = document.getElementById("log");
            let logs = JSON.parse(localStorage.getItem("logs") || "[]");

            box.innerHTML = logs.join("<br>");
        }

        // LOJA
        function buy(cost, item) {
            if (points >= cost) {
                points -= cost;
                log("Comprou: " + item);
                update();
                notifyReward(item);
            } else {
                alert("Pontos insuficientes!");
            }
        }

        // MISSÕES
        function loadMissions() {

            let today = new Date().toDateString();
            let saved = localStorage.getItem("missionDate");
            localStorage.removeItem("goalShown");

            if (saved !== today) {
                localStorage.setItem("missionDate", today);
                localStorage.setItem("missions", JSON.stringify([
                    { txt: " Escovar os dentes", done: 0, max: 3 },
                    { txt: "🚿 Tomar banho", done: 0, max: 1 },
                    { txt: "🛏️ Arrumar a cama", done: 0, max: 1 },
                    { txt: "📚 Fazer tarefa", done: 0, max: 1 },
                    { txt: "🙂 Ser educado", done: 0, max: 1 }
                ]));
            }

            let missions = JSON.parse(localStorage.getItem("missions"));
            let html = "";

            missions.forEach((m, i) => {
                let doneClass = m.done >= m.max ? "done" : "";

                html += `
        <div class="mission ${doneClass}">
            ${m.txt} (${m.done}/${m.max})
            <button onclick="completeMission(${i})">✔</button>
        </div>`;
            });

            document.getElementById("missions").innerHTML = html;
        }

        function completeMission(i) {
            let missions = JSON.parse(localStorage.getItem("missions"));

            if (missions[i].done < missions[i].max) {
                missions[i].done++;
                points += 10;

                log("+10 Missão: " + missions[i].txt);

                localStorage.setItem("missions", JSON.stringify(missions));

                update();
                loadMissions();
                saveCloud();

                checkAllDone();
            }
        }

        //checar missão

        function checkAllDone() {
            let missions = JSON.parse(localStorage.getItem("missions"));

            let allDone = missions.every(m => m.done >= m.max);

            if (allDone && !localStorage.getItem("goalShown")) {
                showGoalAnimation();
                localStorage.setItem("goalShown", "true");
            }
        }

        function showGoalAnimation() {
            let screen = document.getElementById("goalAnimation");
            let sound = document.getElementById("goalSound");

            screen.style.display = "flex";

            sound.currentTime = 0;
            sound.play();

            startFireworks();

            setTimeout(() => {
                screen.style.display = "none";
            }, 10000);
        }

        function startFireworks() {
            const canvas = document.getElementById("fireworks");
            const ctx = canvas.getContext("2d");

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];

            function createFirework() {
                for (let i = 0; i < 50; i++) {
                    particles.push({
                        x: canvas.width / 2,
                        y: canvas.height / 2,
                        speedX: (Math.random() - 0.5) * 10,
                        speedY: (Math.random() - 0.5) * 10,
                        life: 60
                    });
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((p, i) => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.life--;

                    ctx.fillStyle = "lime";
                    ctx.fillRect(p.x, p.y, 3, 3);

                    if (p.life <= 0) particles.splice(i, 1);
                });

                requestAnimationFrame(animate);
            }

            createFirework();
            animate();
        }

        function showChampionAnimation() {
            let screen = document.getElementById("championAnimation");
            let sound = document.getElementById("championSound");

            screen.style.display = "flex";


            sound.currentTime = 0;
            sound.play().catch(() => { });

            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300, 100, 500]);
            }

            startFireworks();
            setTimeout(startFireworks, 500);
            setTimeout(startFireworks, 1000);

            setTimeout(() => {
                screen.style.display = "none";
            }, 15000);
        }

        // NOTIFICAÇÕES
        function notifyUser() {
            if (Notification.permission === "granted") {
                new Notification("Missão do dia!", {
                    body: "Hora de completar suas tarefas 💪"
                });
            }
        }

        function notifyReward(item) {
            if (Notification.permission === "granted") {
                new Notification("Pedido de recompensa 🍬", {
                    body: name + " quer: " + item
                });
            }
        }

        function requestNotification() {
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        }

        // AVATAR
        function loadAvatar(event) {
            let reader = new FileReader();

            reader.onload = function () {
                let img = reader.result;

                document.getElementById("avatar").src = img;
                document.getElementById("avatarBig").src = img;

                localStorage.setItem("avatar", img);

                saveCloud();
                closeAvatarModal();
            }

            reader.readAsDataURL(event.target.files[0]);
        }

        // PWA INSTALL
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById("installBtn").style.display = "block";
        });

        document.getElementById("installBtn").addEventListener("click", async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        });

        // iOS
        function isIos() {
            return /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        }

        function isInStandaloneMode() {
            return ('standalone' in navigator) && navigator.standalone;
        }

        // INIT (CORRETO)
        window.onload = function () {

            let avatar = localStorage.getItem("avatar");
            if (avatar) {
                document.getElementById("avatar").src = avatar;
            }

            if (isIos() && !isInStandaloneMode()) {
                alert("Para instalar o app:\n1. Compartilhar 📤\n2. 'Tela de Início'");
            }

            requestNotification();

            loadCloud();

        }

        function openAvatarModal() {
            let img = localStorage.getItem("avatar");
            if (img) {
                document.getElementById("avatarBig").src = img;
            }
            document.getElementById("avatarModal").style.display = "flex";
        }

        function closeAvatarModal() {
            document.getElementById("avatarModal").style.display = "none";
        }

        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js?v=10');
        }
    </script>
</body>

</html>
